repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint-fix
        files: ^content/blog/
        args: ['--disable', 'MD013']
  - repo: local
    hooks:
      - id: fetch-project-stats
        name: Fetch project stats
        entry: uv run scripts/fetch_project_stats.py
        language: system
        pass_filenames: false
        always_run: true
      - id: download-covers
        name: Download book covers
        entry: uv run scripts/download-covers.py
        language: system
        pass_filenames: false
        always_run: true
