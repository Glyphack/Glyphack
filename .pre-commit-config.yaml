repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint-fix
        files: ^content/blog/
        args: ['--disable', 'MD013']
  - repo: local
    hooks:
      - id: ltex-cli
        name: LTeX Grammar and Spell Checker
        entry: ltex-cli --client-configuration .ltex.json
        language: system
        types_or: [markdown]
