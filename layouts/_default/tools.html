{{ define "main" }}
<article class="post">
  <header>
    <h1 class="post-title">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    {{ .Content }}

    <ul class="tool-list">
      {{ range .Params.tools }}
      <li class="tool-item">
        <a href="{{ .url }}">{{ .name }}</a>
        <span class="tool-description">: {{ .description }}</span>
      </li>
      {{ end }}
    </ul>
  </div>
</article>

<style>
  .tool-list {
    list-style: none;
    padding: 0;
    margin: 1.5rem 0;
  }

  .tool-item {
    margin-bottom: 0.6rem;
    line-height: 1.5;
  }

  .tool-description {
    color: #555;
  }
</style>
{{ end }}
