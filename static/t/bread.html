<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bread Calculator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.4rem; box-sizing: border-box; font-size: 1rem; }
    .grid { display: grid; gap: 0.75rem; }
    .out {
      margin-top: 1.25rem;
      padding: 0.85rem;
      background: rgba(128, 128, 128, 0.1);
      border-radius: 6px;
    }
    .back { display: inline-block; margin-top: 2rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>🍞 Bread calculator</h1>

  <div class="grid">
    <label>Total dough (g):
      <input type="number" id="bc-dough" value="1000" oninput="bcCalc()">
    </label>
    <label>Hydration (%):
      <input type="number" id="bc-hyd" value="70" oninput="bcCalc()">
    </label>
    <label>Salt (%):
      <input type="number" id="bc-salt" value="2" step="0.1" oninput="bcCalc()">
    </label>
    <label>Yeast (%):
      <input type="number" id="bc-yeast" value="1" step="0.1" oninput="bcCalc()">
    </label>
  </div>

  <div id="bc-out" class="out"></div>

  <a class="back" href="/t">← back to tools</a>

  <script>
    function bcCalc() {
      const total = +document.getElementById('bc-dough').value;
      const h = +document.getElementById('bc-hyd').value / 100;
      const s = +document.getElementById('bc-salt').value / 100;
      const y = +document.getElementById('bc-yeast').value / 100;
      const flour = total / (1 + h + s + y);
      document.getElementById('bc-out').innerHTML =
        `Flour: <b>${Math.round(flour)} g</b><br>` +
        `Water: <b>${Math.round(flour * h)} g</b><br>` +
        `Salt: <b>${Math.round(flour * s)} g</b><br>` +
        `Yeast: <b>${Math.round(flour * y)} g</b>`;
    }
    bcCalc();
  </script>
</body>
</html>
